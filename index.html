<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOWS OF THE ABYSS</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1473740311519039673/1474872572771438793/ChatGPT_Image_21_de_fev._de_2026_17_56_37.png?ex=699b6d9f&is=699a1c1f&hm=05bba2b88c6dc7876c06490c9170f7510f0da4d4ea12a71dc3dfdd40b4ea8807&">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img
        id="dvd-gif"
        src="https://cdn.discordapp.com/attachments/1325501562105106484/1413949848172105949/0906_12.gif?ex=699de9e9&is=699c9869&hm=adebf02b11c49b0e0d41a77d68a22eeb79650a272e7f42a81357f8930450d1c0&"
        alt=""
        aria-hidden="true"
        loading="eager"
        decoding="async"
    >

    <div class="ambient-glow ambient-glow-left"></div>
    <div class="ambient-glow ambient-glow-right"></div>
    <div id="runaway-bounds" aria-hidden="true"></div>

    <main class="container">
        <p class="eyebrow">Experiencia Interativa</p>
        <h1>SH<span id="shadows-a-trigger" class="shadows-a" role="button" tabindex="0" aria-label="Abrir alerta">A</span>DOWS <span class="title-o-wrap"><span id="chess-trigger" class="title-o" role="button" tabindex="0" aria-label="Abrir xadrez">O</span>F</span> THE <span id="abyss-trigger" style="cursor: pointer;">ABYSS</span><button id="copyright-trigger" class="copyright-trigger" type="button" aria-label="Abrir pergaminho">©</button></h1>
        <h2>em breve</h2>

        <a class="launch-link" href="#" aria-label="Acompanhar lancamento">
            Acompanhar lancamento
        </a>

        <div id="countdown">
            <div class="time">
                <span id="days"></span>
                <p>Dias</p>
            </div>
            <div class="time">
                <span id="hours"></span>
                <p>Horas</p>
            </div>
            <div class="time">
                <span id="minutes"></span>
                <p>Minutos</p>
            </div>
            <div class="time">
                <span id="seconds"></span>
                <p>Segundos</p>
            </div>
        </div>

        <div class="badge-zone" id="badge-button-zone">
            <button class="runaway-button" id="badge-runaway-button" type="button">
                enquanto espera, resgate seu emblema
            </button>
        </div>
		
		<div class="music-player-container">
    <div class="player-content" id="player-content">
        <iframe 
    width="100%" 
    height="166" 
    scrolling="no" 
    frameborder="no" 
    allow="autoplay" 
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/urlank/adia-nerfa-e-lanca-dlc&color=%23ff3b1f&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
</iframe>
    </div>
    <button class="player-toggle" id="player-toggle" aria-label="Abrir Player">
        <span class="icon">🎵</span>
    </button>
</div>
		
    </main>

    <section class="video-modal" id="video-modal" aria-hidden="true">
        <div class="video-modal-backdrop" data-close-modal></div>
        <div
            class="video-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="video-modal-title"
        >
            <button class="video-modal-close" type="button" data-close-modal aria-label="Fechar">
                x
            </button>
            <p class="video-modal-kicker">Atenção</p>
            <h3 id="video-modal-title">A equipe esta trabalhando.</h3>
            <div class="video-frame-wrap">
                <iframe
                    id="launch-video"
                    title="Teaser de desenvolvimento"
                    src=""
                    allow="autoplay; encrypted-media; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen
                ></iframe>
            </div>
        </div>
    </section>

    <section class="chess-modal" id="chess-modal" aria-hidden="true">
        <div class="chess-modal-backdrop" data-close-chess></div>
        <div
            class="chess-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="chess-modal-title"
        >
            <button class="chess-modal-close" type="button" data-close-chess aria-label="Fechar">
                x
            </button>
            <p class="chess-modal-kicker">Mini Jogo</p>
            <h3 id="chess-modal-title">Xadrez</h3>
            <div class="chess-online-controls">
                <label class="chess-field chess-mode-field">
                    <span>Modo</span>
                    <select id="chess-mode">
                        <option value="local" selected>Local offline (voce vs IA)</option>
                        <option value="online">Online automatico (2 jogadores)</option>
                    </select>
                </label>
                <button class="chess-connect chess-online-only" id="chess-connect" type="button">Conectar</button>
                <details class="chess-advanced chess-online-only">
                    <summary>Configuracao online</summary>
                    <label class="chess-field">
                        <span>Servidor WS</span>
                        <input id="chess-server-url" type="text" value="ws://localhost:8080" placeholder="ws://localhost:8080">
                    </label>
                    <label class="chess-field">
                        <span>Sala (opcional)</span>
                        <input id="chess-room-id" type="text" value="" placeholder="deixe vazio para pareamento automatico">
                    </label>
                </details>
            </div>
            <p class="chess-meta" id="chess-meta">Modo local</p>
            <p class="chess-status" id="chess-status">Vez das brancas</p>
            <div class="chess-board" id="chess-board" aria-label="Tabuleiro de xadrez"></div>
            <button class="chess-reset" id="chess-reset" type="button">Reiniciar partida</button>
        </div>
    </section>
    
    <section class="parchment-modal" id="parchment-modal" aria-hidden="true">
        <div class="parchment-modal-backdrop" data-close-parchment></div>
        <div class="parchment-scroll" role="dialog" aria-modal="true" aria-labelledby="parchment-text">
            <button class="parchment-close" type="button" data-close-parchment aria-label="Fechar">x</button>
            <p class="parchment-text" id="parchment-text"><span class="parchment-typing">100% oliginal</span></p>
        </div>
    </section>

    <section class="warning-modal" id="warning-modal" aria-hidden="true">
        <div class="warning-modal-backdrop"></div>
        <div class="warning-modal-card" role="dialog" aria-modal="true" aria-labelledby="warning-title">
            <img
                class="warning-image"
                src="https://cdn.discordapp.com/attachments/1455941041009070242/1475575878309118021/tumato.png?ex=699dfca0&is=699cab20&hm=1a2ba9ad60936d21da8c3f2c19f48342fba0e1157d4db2a47b6fb0d322e498b3&"
                alt="Alerta"
            >
            <h3 id="warning-title">VOCÊ VIU DE MAIS</h3>
            <p class="warning-countdown" id="warning-countdown">Fechando em 3...</p>
        </div>
    </section>

    <div id="random-photo-layer" aria-hidden="true">
        <img
            id="random-photo"
            src="https://cdn.discordapp.com/attachments/1473740311519039673/1474856214067286107/download.png?ex=699b5e62&is=699a0ce2&hm=1a86ac614c8abb1c2dfa343a9e5eaefc5fd48f8a2e3edd7f6bf69197649caf71&"
            alt="Foto aleatoria"
        >
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>
</html>
