<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOWS OF THE ABYSS</title>
    <link rel="icon" type="image/png" href="https://cdn.discordapp.com/attachments/1473740311519039673/1474872572771438793/ChatGPT_Image_21_de_fev._de_2026_17_56_37.png?ex=699b6d9f&is=699a1c1f&hm=05bba2b88c6dc7876c06490c9170f7510f0da4d4ea12a71dc3dfdd40b4ea8807&">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img
        id="dvd-gif"
        src="https://cdn.discordapp.com/attachments/1325501562105106484/1413949848172105949/0906_12.gif?ex=699a9e29&is=69994ca9&hm=80530eb150dc30745a343cdc3fb6e0212e6c4be145924d3166a3f235bbbfeccb&"
        alt=""
        aria-hidden="true"
        loading="eager"
        decoding="async"
    >

    <div class="ambient-glow ambient-glow-left"></div>
    <div class="ambient-glow ambient-glow-right"></div>
    <div id="runaway-bounds" aria-hidden="true"></div>

    <main class="container">
        <p class="eyebrow">Experiencia Interativa</p>
        <h1>SHADOWS OF THE <span id="abyss-trigger" style="cursor: pointer;">ABYSS</span></h1>
        <h2>em breve</h2>

        <a class="launch-link" href="#" aria-label="Acompanhar lancamento">
            Acompanhar lancamento
        </a>

        <div id="countdown">
            <div class="time">
                <span id="days"></span>
                <p>Dias</p>
            </div>
            <div class="time">
                <span id="hours"></span>
                <p>Horas</p>
            </div>
            <div class="time">
                <span id="minutes"></span>
                <p>Minutos</p>
            </div>
            <div class="time">
                <span id="seconds"></span>
                <p>Segundos</p>
            </div>
        </div>

        <div class="badge-zone" id="badge-button-zone">
            <button class="runaway-button" id="badge-runaway-button" type="button">
                enquanto espera, resgate seu emblema
            </button>
        </div>
		
		<div class="music-player-container">
    <div class="player-content" id="player-content">
        <iframe 
    width="100%" 
    height="166" 
    scrolling="no" 
    frameborder="no" 
    allow="autoplay" 
    src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/urlank/adia-nerfa-e-lanca-dlc&color=%23ff3b1f&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false">
</iframe>
    </div>
    <button class="player-toggle" id="player-toggle" aria-label="Abrir Player">
        <span class="icon">🎵</span>
    </button>
</div>
		
    </main>

    <section class="video-modal" id="video-modal" aria-hidden="true">
        <div class="video-modal-backdrop" data-close-modal></div>
        <div
            class="video-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="video-modal-title"
        >
            <button class="video-modal-close" type="button" data-close-modal aria-label="Fechar">
                x
            </button>
            <p class="video-modal-kicker">Atenção</p>
            <h3 id="video-modal-title">A equipe esta trabalhando.</h3>
            <div class="video-frame-wrap">
                <iframe
                    id="launch-video"
                    title="Teaser de desenvolvimento"
                    src=""
                    allow="autoplay; encrypted-media; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen
                ></iframe>
            </div>
        </div>
    </section>

    <div id="random-photo-layer" aria-hidden="true">
        <img
            id="random-photo"
            src="https://cdn.discordapp.com/attachments/1473740311519039673/1474856214067286107/download.png?ex=699b5e62&is=699a0ce2&hm=1a86ac614c8abb1c2dfa343a9e5eaefc5fd48f8a2e3edd7f6bf69197649caf71&"
            alt="Foto aleatoria"
        >
    </div>

    <script src="script.js"></script>
</body>
</html>
